# ==============================================================================
# GitHub Actions — Drupal CI/CD Pipeline for nasande.cg
# ==============================================================================
# Triggered on push to `main` branch or manual dispatch.
# Validates code, then deploys via SSH to cPanel (PlanetHoster).
#
# REQUIRED GITHUB SECRETS:
#   SSH_HOST       — serveur SSH (ex: world-366.fr.planethoster.net)
#   SSH_USER       — username SSH cPanel (ex: nasacdka)
#   SSH_KEY        — clé privée SSH (ed25519)
#   SSH_KEY_PASSPHRASE — passphrase de la clé SSH
#   SSH_PORT       — port SSH (5022 pour PlanetHoster)
#   DEPLOY_PATH    — chemin absolu du projet sur le serveur
# ==============================================================================

name: Deploy Drupal

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: "8.3"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Validate
  # ─────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, gd, curl, zip, mysql
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Check composer.lock is up to date
        run: composer validate --no-check-publish --check-lock

      - name: PHP syntax check (custom modules)
        run: |
          find modules/custom -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -v "No syntax errors" || true
          find modules/custom -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -q "Parse error" && exit 1 || true

  # ─────────────────────────────────────────────────────────
  # Job 2: Deploy to Production
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    environment: production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        env:
          SSH_CMD: ssh -p ${{ secrets.SSH_PORT }} -o ConnectTimeout=30 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          $SSH_CMD << 'DEPLOY_SCRIPT'
          set -euo pipefail

          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cd "$DEPLOY_PATH"

          # ── Detect Drush ──
          if [ -f "vendor/bin/drush" ]; then
            DRUSH="vendor/bin/drush"
          else
            DRUSH="drush"
          fi

          # ── Pull latest code ──
          echo "==> Pulling latest code..."
          git pull origin main --ff-only

          # ── Install dependencies ──
          echo "==> Installing Composer dependencies..."
          if [ -f "composer.phar" ]; then
            php composer.phar install --no-dev --optimize-autoloader --no-interaction
          else
            composer install --no-dev --optimize-autoloader --no-interaction
          fi

          # ── Backup database ──
          echo "==> Backing up database..."
          mkdir -p backups
          $DRUSH sql-dump --gzip --result-file="$DEPLOY_PATH/backups/pre-deploy_${TIMESTAMP}.sql" || echo "WARNING: DB backup failed, continuing..."

          # ── Run database updates ──
          echo "==> Running database updates..."
          $DRUSH updatedb -y

          # ── Import configuration ──
          echo "==> Importing configuration..."
          $DRUSH config:import -y

          # ── Rebuild cache ──
          echo "==> Rebuilding cache..."
          $DRUSH cache:rebuild

          # ── Cleanup old backups (keep last 10) ──
          ls -t backups/pre-deploy_*.sql.gz 2>/dev/null | tail -n +11 | xargs -r rm --

          echo "==> Deployment complete! ($TIMESTAMP)"
          DEPLOY_SCRIPT

      - name: Deployment succeeded
        if: success()
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Deployment failed
        if: failure()
        run: |
          echo "### Deployment FAILED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${GITHUB_SHA::8}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Check the logs above for details. The database backup (if created) is in \`backups/\`." >> $GITHUB_STEP_SUMMARY
