name: Wosh D11 Theme
type: theme
base theme: false
description: 'Wosh Drupal 11 Responsive Theme. Based on the original Wosh theme, adapted for Drupal 11 API. Developed & Designed by <a href=http://www.hugestem.com>HugeStem</a>'
package: custom
version: '2.0'
core_version_requirement: ^10 || ^11

#Libraries
libraries:
  - wosh_d11/bootstrap
  - wosh_d11/font-awesome
  - wosh_d11/ionicons
  - wosh_d11/owl-carousel
  - wosh_d11/shuffle
  - wosh_d11/animation
  - wosh_d11/slimscroll
  - wosh_d11/fonts
  - wosh_d11/smartmenus
  - wosh_d11/global-components

stylesheets-remove:
  - core/assets/vendor/normalize-css/normalize.css
  - core/modules/system/css/system.module.css
  - core/modules/system/css/system.theme.css
  - core/modules/views/css/views.module.css

#Regions
regions:
  branding: 'Branding'
  primary_menu: 'Primary Menu'
  user_account: 'User Account'
  search: 'Search'
  cart: 'Cart'
  header: 'Header'
  slider: 'Slider'
  page_title: 'Page Title'
  breadcrumb: 'Breadcrumb'
  content_wide_top: 'Content Wide Top'
  content: 'Content'
  sidebar_first: 'Left Sidebar'
  sidebar_second: 'Right Sidebar'
  content_wide: 'Content Wide Bottom'
  footer_first: 'Footer First Widget'
  footer_second: 'Footer Second Widget'
  footer_third: 'Footer Third Widget'
  footer_forth: 'Footer Forth Widget'
  footer_bottom_first: 'Footer Bottom First'
  footer_bottom_second: 'Footer Bottom Second'
  footer: 'Footer'
  auto_hidden_block: 'Auto hidden blocks'

# Drupal 11 specific configurations
starterkit: false
hidden: false
